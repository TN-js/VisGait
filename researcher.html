<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <title>VisGait - Researcher View</title>
    <link rel="stylesheet" href="css/styles.css?v0.0.2">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="researcher-content">
        <div class="researcher-box">
            <div class="parallel-coord-plot" id="parallel-coord-plot"></div>
            <div class="line-plot-with-std" id="line-plot-with-std">
            </div>
            <div class="scatter-plot-matrix" id="scatter-plot-matrix" style="position:relative;">
                <button class="enlarge-btn" onclick="openResearcherModal('scatter')">⛶</button>
            </div>
            <div class="violin-plot" id="violin-plot" style="position:relative;">
                <button class="enlarge-btn" onclick="openResearcherModal('violin')">⛶</button>
            </div>
        </div>
    </main>

    <footer class="disclaimer-footer">
        Disclaimer: The gait performance data presented in this dashboard is synthetic and generated for demonstration purposes only. It does not represent real patient data.
    </footer>

    <!-- Expand Modal -->
    <div id="researcher-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeResearcherModal()">&times;</span>
            <h2 id="researcher-modal-title" style="margin-top:0; color:#1e293b;">Detailed View</h2>
            <div id="researcher-modal-container" style="flex:1; display:flex; justify-content:center; align-items:center; overflow:hidden;"></div>
        </div>
    </div>

    <!-- Metric Info Tooltip -->
    <div id="metric-info-tooltip" class="metric-info-tooltip"></div>

    <div id="vis-tooltip" class="vis-tooltip"></div>
    <script src="js/config.js"></script>
    <script src="js/researcher-view.js"></script>
    <script>
        function openResearcherModal(type) {
            window.dispatchEvent(new CustomEvent('openResearcherModal', { detail: { type } }));
        }
        function closeResearcherModal() {
            document.getElementById('researcher-modal').style.display = 'none';
        }
    </script>
</body>
</html>
